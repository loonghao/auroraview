name: Mutation Testing

# Runs cargo-mutants to detect undertested code.
# - On PRs: incremental mode (only mutate changed files)
# - Weekly: full scan on core crates
# - Manual: configurable via workflow_dispatch

on:
  # Weekly full mutation scan (Sunday 03:00 UTC)
  schedule:
    - cron: '0 3 * * 0'

  # PR incremental mutation testing (only changed Rust files)
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'crates/**/*.rs'
      - 'src/**/*.rs'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Mutation testing mode'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
          - crate
      crate:
        description: 'Crate to test (only for crate mode)'
        required: false
        default: 'auroraview-core'
        type: string
      shard:
        description: 'Shard index/count (e.g. 0/4) for parallel runs'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: mutation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: '600'
  CARGO_NET_RETRY: '10'

jobs:
  # ===========================================================================
  # Incremental mutation testing (PR only - test mutations in changed files)
  # ===========================================================================
  incremental:
    name: Incremental Mutations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libgtk-3-dev libglib2.0-dev libxdo-dev pkg-config

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tools: 'just bun'
          cache: 'false'

      - name: Build frontend assets
        run: vx just ci-assets-build

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mutants-

      - name: Install cargo-mutants and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants,nextest

      - name: Get changed Rust files
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }}..HEAD -- '*.rs' | grep -E '^(crates|src)/' | head -20 || true)
          if [ -z "$files" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No Rust source files changed"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            # Build --file args
            file_args=""
            for f in $files; do
              file_args="$file_args --file $f"
            done
            echo "file_args=$file_args" >> $GITHUB_OUTPUT
            echo "Changed files: $files"
          fi

      - name: Run incremental mutation testing
        if: steps.changed.outputs.skip != 'true'
        run: |
          cargo mutants --no-shuffle --timeout 120 ${{ steps.changed.outputs.file_args }} -- --config-file .config/nextest.toml --features "test-helpers" 2>&1 | tee mutants-output.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_ENV

      - name: Parse mutation results
        if: steps.changed.outputs.skip != 'true' && always()
        id: results
        run: |
          if [ -d "mutants.out" ]; then
            total=$(grep -c "." mutants.out/caught.txt 2>/dev/null || echo "0")
            caught=$(grep -c "." mutants.out/caught.txt 2>/dev/null || echo "0")
            missed=$(grep -c "." mutants.out/missed.txt 2>/dev/null || echo "0")
            timeout=$(grep -c "." mutants.out/timeout.txt 2>/dev/null || echo "0")
            unviable=$(grep -c "." mutants.out/unviable.txt 2>/dev/null || echo "0")
            if [ "$((caught + missed))" -gt 0 ]; then
              score=$(( caught * 100 / (caught + missed) ))
            else
              score=100
            fi
            echo "caught=$caught" >> $GITHUB_OUTPUT
            echo "missed=$missed" >> $GITHUB_OUTPUT
            echo "timeout=$timeout" >> $GITHUB_OUTPUT
            echo "unviable=$unviable" >> $GITHUB_OUTPUT
            echo "score=$score" >> $GITHUB_OUTPUT
          else
            echo "caught=0" >> $GITHUB_OUTPUT
            echo "missed=0" >> $GITHUB_OUTPUT
            echo "score=100" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with mutation results
        if: steps.changed.outputs.skip != 'true' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const caught = '${{ steps.results.outputs.caught }}';
            const missed = '${{ steps.results.outputs.missed }}';
            const score = '${{ steps.results.outputs.score }}';
            const timeout = '${{ steps.results.outputs.timeout }}';

            let body = '## Mutation Testing Results\n\n';
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Caught | ${caught} |\n`;
            body += `| Missed | ${missed} |\n`;
            body += `| Timeout | ${timeout} |\n`;
            body += `| **Score** | **${score}%** |\n\n`;

            if (parseInt(missed) > 0) {
              body += '> Some mutations survived. Consider adding tests for the affected code paths.\n';
              body += '<details><summary>Missed mutants</summary>\n\n```\n';
              const fs = require('fs');
              if (fs.existsSync('mutants.out/missed.txt')) {
                body += fs.readFileSync('mutants.out/missed.txt', 'utf-8').substring(0, 3000);
              }
              body += '\n```\n</details>\n';
            } else {
              body += 'All mutations were caught by tests.\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Mutation Testing Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mutation-results-incremental
          path: mutants.out/
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # Full mutation testing (weekly schedule or manual trigger)
  # ===========================================================================
  full:
    name: Full Mutations (${{ matrix.crate }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full')
    strategy:
      fail-fast: false
      matrix:
        crate:
          - auroraview-signals
          - auroraview-protect
          - auroraview-core
          - auroraview-pack
          - auroraview-cli
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libgtk-3-dev libglib2.0-dev libxdo-dev pkg-config

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tools: 'just bun'
          cache: 'false'

      - name: Build frontend assets
        run: vx just ci-assets-build

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mutants-full-${{ matrix.crate }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mutants-full-${{ matrix.crate }}-

      - name: Install cargo-mutants and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants,nextest

      - name: Run full mutation testing
        run: |
          cargo mutants -p ${{ matrix.crate }} --no-shuffle --timeout 120 -- --config-file .config/nextest.toml --features "test-helpers"

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mutation-results-${{ matrix.crate }}
          path: mutants.out/
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # Single crate mutation testing (manual dispatch)
  # ===========================================================================
  single-crate:
    name: Mutations (${{ github.event.inputs.crate }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'crate'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libgtk-3-dev libglib2.0-dev libxdo-dev pkg-config

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tools: 'just bun'
          cache: 'false'

      - name: Build frontend assets
        run: vx just ci-assets-build

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mutants-${{ github.event.inputs.crate }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mutants-${{ github.event.inputs.crate }}-

      - name: Install cargo-mutants and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants,nextest

      - name: Run mutation testing
        run: |
          shard_arg=""
          if [ -n "${{ github.event.inputs.shard }}" ]; then
            shard_arg="--shard ${{ github.event.inputs.shard }}"
          fi
          cargo mutants -p ${{ github.event.inputs.crate }} $shard_arg --no-shuffle --timeout 120 -- --config-file .config/nextest.toml --features "test-helpers"

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mutation-results-${{ github.event.inputs.crate }}
          path: mutants.out/
          retention-days: 14
          if-no-files-found: ignore
