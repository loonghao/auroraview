# AuroraView Gallery - Debug Pack Configuration
# Based on auroraview.pack.toml, but enables debugging capabilities.

[package]
name = "auroraview-gallery"
version = "0.1.0.0"
title = "AuroraView Gallery (Debug)"
identifier = "com.auroraview.gallery.debug"
description = "Interactive showcase of all AuroraView features and components (Debug)"
authors = ["AuroraView Team"]
license = "MIT"
homepage = "https://github.com/AuroraView/auroraview"
repository = "https://github.com/AuroraView/auroraview"
allow_new_window = true

[frontend]
path = "./dist"

[backend]
type = "python"

[backend.python]
version = "3.11"
entry_point = "main:run_gallery"
packages = ["pyyaml", "pydantic-ai-slim[openai,anthropic,google]", "httpx"]
include_paths = [".", "../python", "../packages/auroraview-ai/src"]
exclude = ["*.pyc", "__pycache__", "*.egg-info", "tests", "node_modules", "dist", "pack-output"]
optimize = 1
strategy = "standalone"
pip_via_vx_only = true

[backend.python.isolation]
pythonpath = true
path = true
extra_path = []
extra_pythonpath = []
inherit_env = [
    "SYSTEMROOT",
    "SYSTEMDRIVE",
    "TEMP",
    "TMP",
    "USERPROFILE",
    "APPDATA",
    "LOCALAPPDATA",
    "HOMEDRIVE",
    "HOMEPATH",
    "COMPUTERNAME",
    "USERNAME",
    "OPENAI_API_KEY",
    "ANTHROPIC_API_KEY",
    "GEMINI_API_KEY",
    "GOOGLE_API_KEY",
    "DEEPSEEK_API_KEY",
    "GROQ_API_KEY",
    "HTTP_PROXY",
    "HTTPS_PROXY",
    "NO_PROXY",
    "http_proxy",
    "https_proxy",
    "no_proxy",
]

[backend.python.protection]
enabled = false
method = "bytecode"
optimization = 2
keep_temp = false

[backend.python.protection.encryption]
enabled = true
algorithm = "x25519"

[backend.process]
console = false
args = []
env = { GALLERY_MODE = "production" }
restart_on_crash = false
max_restarts = 3

[window]
width = 1200
height = 800
min_width = 800
min_height = 600
resizable = true
frameless = false
transparent = false
always_on_top = false
start_position = "center"

[bundle]
icon = "../assets/icons/auroraview-256.png"
copyright = "Copyright 2025 AuroraView Team"
category = "Developer Tools"
short_description = "AuroraView Feature Gallery"

[bundle.windows]
icon = "../assets/icons/auroraview.ico"
console = false

[build]
before = ["bun run build"]
after = []
compression_level = 19
resources = ["./public"]
exclude = ["*.map", "*.ts", "node_modules"]
out_dir = "./pack-output"
release = true

[vx]
enabled = true
ensure = ["python@3.11", "uv", "node", "bun"]

[hooks]
use_vx = true
before_collect = []
after_pack = []

[[hooks.collect]]
source = "../examples/*.py"
dest = "resources/examples"
preserve_structure = false
description = "Python example files for the gallery"

[[hooks.collect]]
source = "../examples/*.html"
dest = "resources/examples"
preserve_structure = false
description = "HTML example files"

[[hooks.collect]]
source = "../examples/agent_browser"
dest = "resources/examples/agent_browser"
preserve_structure = true
description = "Agent browser resources (HTML templates, bookmarks, etc.)"

[[hooks.collect]]
source = "../examples/*.toml"
dest = "resources/examples"
preserve_structure = false
description = "TOML configuration files"

[extensions]
enabled = true
bundle = true
local = [
    "./extensions/devtools-helper",
]

[[extensions.remote]]
id = "react-devtools"
url = "https://chromewebstore.google.com/detail/react-developer-tools/fmkadmapgofadopljbjfkapdkoienihi"
strip_components = 0

[runtime]
[runtime.env]
AURORAVIEW_APP = "gallery"
LOG_LEVEL = "debug"
AURORAVIEW_GALLERY_RUST_SENTRY_DSN = "https://57998c4277aaf71ab7b498788db74df6@o112355.ingest.us.sentry.io/4510966627893248"
AURORAVIEW_GALLERY_RUST_OTLP_ENDPOINT = "https://o112355.ingest.us.sentry.io/api/4510966627893248/integration/otlp"
AURORAVIEW_GALLERY_RUST_SERVICE_NAME = "auroraview-gallery-packed-client"
AURORAVIEW_GALLERY_RUST_SENTRY_ENV = "production"
AURORAVIEW_GALLERY_RUST_SENTRY_SAMPLE_RATE = "1.0"
AURORAVIEW_GALLERY_RUST_SENTRY_TRACES_SAMPLE_RATE = "0.2"
VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_DSN = "https://2ceb9e07d5ac1b35a9744cf1b8db0a18@o112355.ingest.us.sentry.io/4510966806872064"
VITE_AURORAVIEW_GALLERY_FRONTEND_OTLP_ENDPOINT = "https://o112355.ingest.us.sentry.io/api/4510966806872064/integration/otlp"
VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_SAMPLE_RATE = "1.0"
VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_TRACES_SAMPLE_RATE = "0.2"

[debug]
enabled = true
devtools = true
verbose = false
remote_debugging_port = 9222

