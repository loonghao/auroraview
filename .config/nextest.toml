[profile.default]
failure-output = "immediate-final"
retries = { backoff = "fixed", count = 1, delay = "1s" }
slow-timeout = { period = "60s", terminate-after = 2, grace-period = "10s" }
# Fail fast locally to save developer time
fail-fast = true

[profile.ci]
inherits = "default"
flaky-result = "fail"
slow-timeout = { period = "90s", terminate-after = 2, grace-period = "10s" }
# CI should run all tests even if some fail
fail-fast = false

[profile.ci.junit]
path = "junit.xml"
report-name = "auroraview-rust-ci"
store-failure-output = true

# Agent-friendly profile: JSON + JUnit output for machine consumption
[profile.agent]
inherits = "ci"
retries = { backoff = "fixed", count = 2, delay = "1s" }
slow-timeout = { period = "120s", terminate-after = 2, grace-period = "10s" }
fail-fast = false

[profile.agent.junit]
path = "agent-junit.xml"
report-name = "auroraview-agent"
store-failure-output = true
store-success-output = true

# Fast profile for quick iteration (harness-quick / agent loops)
[profile.fast]
inherits = "default"
retries = 0
slow-timeout = { period = "30s", terminate-after = 1, grace-period = "5s" }
fail-fast = true
status-level = "fail"
final-status-level = "fail"

# Flaky-detection profile: run all tests with extra retries to surface flaky tests
[profile.flaky-detect]
inherits = "default"
retries = { backoff = "exponential", count = 3, delay = "500ms", max-delay = "5s" }
slow-timeout = { period = "120s", terminate-after = 2, grace-period = "10s" }
fail-fast = false

# Snapshot review profile: for running insta snapshot tests
[profile.snapshot]
inherits = "default"
retries = 0
fail-fast = false

# Mutation testing profile: used by cargo-mutants via nextest
# Short timeout, no retries (mutations should fail fast)
[profile.mutation]
inherits = "default"
retries = 0
slow-timeout = { period = "45s", terminate-after = 1, grace-period = "5s" }
fail-fast = true
status-level = "fail"
final-status-level = "fail"

# Test groups for resource isolation
# Tests that bind ports or use shared resources must run serially
[test-groups.serial-network]
max-threads = 1

[[overrides]]
filter = "test(mdns) | test(http_discovery) | test(port_allocator)"
test-group = "serial-network"

[[overrides]]
filter = "test(thread_safety)"
threads-required = 1
