name: Build Gallery

# Build Gallery standalone executable workflow (FullStack mode with Python backend)
# Only runs on workflow_call (from release.yml) or manual trigger.
# Requires pre-built auroraview wheels for Python dependency collection.

on:
  workflow_dispatch:
  workflow_call:

# Cancel in-progress runs for the same workflow/ref combination
# Use workflow file name instead of github.workflow to avoid conflicts when called from release.yml
# When called via workflow_call, github.workflow becomes the parent workflow name (e.g., "Release")
concurrency:
  group: build-gallery-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-frontend:
    name: Build Gallery Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup AuroraView Environment
        uses: ./.github/actions/setup-auroraview
        with:
          install-dependencies: 'false'
          cache-key-suffix: 'gallery-frontend'

      - name: Build Gallery frontend
        shell: bash
        run: vx just gallery-ci-build
        env:
          VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_DSN: ${{ secrets.SENTRY_FRONTEND_DSN }}
          VITE_AURORAVIEW_GALLERY_FRONTEND_OTLP_ENDPOINT: ${{ secrets.SENTRY_FRONTEND_OTLP_ENDPOINT }}
          VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_SAMPLE_RATE: ${{ vars.SENTRY_FRONTEND_SAMPLE_RATE || '1.0' }}
          VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_FRONTEND_TRACES_SAMPLE_RATE || '0.2' }}

      - name: Upload Gallery frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: gallery-frontend-dist-${{ github.run_id }}
          path: gallery/dist/
          retention-days: 7

  # First, build SDK assets (needed for wheel builds)
  build-sdk-assets:
    name: Build SDK Assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup AuroraView Environment
        uses: ./.github/actions/setup-auroraview
        with:
          install-dependencies: 'false'
          cache-key-suffix: 'gallery-sdk-assets'

      - name: Build auroraview-assets
        run: vx just ci-assets-build

      - name: Build SDK assets
        run: vx just ci-sdk-assets

      - name: Upload SDK assets artifact
        uses: actions/upload-artifact@v7
        with:
          # Use unique name with run_id to avoid conflicts with other workflows
          name: gallery-sdk-assets-${{ github.run_id }}
          path: |
            crates/auroraview-core/src/assets/js/core/
            crates/auroraview-core/src/assets/js/plugins/
          retention-days: 7

      - name: Upload auroraview-assets artifact
        uses: actions/upload-artifact@v7
        with:
          name: gallery-vite-assets-${{ github.run_id }}
          path: crates/auroraview-assets/frontend/dist/
          retention-days: 7

  # Build wheels for all platforms (needed for Python dependency collection)
  build-wheels:
    name: Build Wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    needs: build-sdk-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            artifact-name: gallery-wheels-linux-x86_64
            maturin-args: '--release --out dist --find-interpreter --features python-bindings,ext-module,abi3-py38'
          - os: windows-latest
            target: x64
            artifact-name: gallery-wheels-windows-x64
            maturin-args: '--release --out dist --find-interpreter --features python-bindings,ext-module,abi3-py38,win-webview2'
          - os: macos-latest
            target: universal2-apple-darwin
            artifact-name: gallery-wheels-macos-universal2-apple-darwin
            maturin-args: '--release --out dist --find-interpreter --features python-bindings,ext-module,abi3-py38'
    steps:
      - uses: actions/checkout@v6

      - name: Download SDK assets
        uses: actions/download-artifact@v8
        with:
          name: gallery-sdk-assets-${{ github.run_id }}
          path: crates/auroraview-core/src/assets/js/

      - name: Download auroraview-assets
        uses: actions/download-artifact@v8
        with:
          name: gallery-vite-assets-${{ github.run_id }}
          path: crates/auroraview-assets/frontend/dist/

      - name: Build Wheel
        uses: ./.github/actions/build-wheel
        with:
          target: ${{ matrix.target }}
          python-version: '3.11'
          maturin-args: ${{ matrix.maturin-args }}
          test-wheel: 'false'
          artifact-name: ${{ matrix.artifact-name }}

  build:
    name: Build Gallery (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [build-wheels, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: auroraview-gallery.exe
            archive: auroraview-gallery-windows-x64.zip
            wheel-artifact: gallery-wheels-windows-x64
          # macOS ARM
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: auroraview-gallery
            archive: auroraview-gallery-macos-arm64.tar.gz
            wheel-artifact: gallery-wheels-macos-universal2-apple-darwin
          # macOS Intel (cross-compile on ARM runner)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: auroraview-gallery
            archive: auroraview-gallery-macos-x64.tar.gz
            wheel-artifact: gallery-wheels-macos-universal2-apple-darwin
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: auroraview-gallery
            archive: auroraview-gallery-linux-x64.tar.gz
            wheel-artifact: gallery-wheels-linux-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Setup AuroraView Environment
        uses: ./.github/actions/setup-auroraview
        with:
          install-dependencies: 'false'
          cache-key-suffix: 'build-gallery-${{ matrix.target }}'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Download pre-built auroraview wheel
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.wheel-artifact }}
          path: dist/

      - name: Install auroraview wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          wheel_file=$(ls -t dist/*.whl | head -1)
          echo "Installing wheel: $wheel_file"
          pip install "$wheel_file"
          python -c "import auroraview; print(f'auroraview {auroraview.__version__} installed')"

      - name: Download Gallery frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: gallery-frontend-dist-${{ github.run_id }}
          path: gallery/dist/

      - name: Build CLI (for pack command, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vx just ci-assets-build
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) {
            throw 'Visual Studio installation with MSVC tools not found'
          }
          $vsDevCmd = Join-Path $installPath 'Common7\Tools\VsDevCmd.bat'
          cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 && rustup target add ${{ matrix.target }} && cargo build -p auroraview-cli --release --target ${{ matrix.target }}"

      - name: Build CLI (for pack command, Non-Windows)
        if: runner.os != 'Windows'
        run: vx just ci-cli-build ${{ matrix.target }}

      - name: Pack Gallery executable (FullStack mode)
        shell: bash
        run: |
          mkdir -p target/pack
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./target/${{ matrix.target }}/release/auroraview-cli.exe pack \
              --config gallery/auroraview.pack.toml \
              --output-dir target/pack
          else
            # Ensure system libraries are in LD_LIBRARY_PATH
            export LD_LIBRARY_PATH="/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
            ./target/${{ matrix.target }}/release/auroraview-cli pack \
              --config gallery/auroraview.pack.toml \
              --output-dir target/pack
          fi
        env:
          # Frontend Sentry configuration must also be forwarded here because pack runs gallery [build].before again.
          VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_DSN: ${{ secrets.SENTRY_FRONTEND_DSN }}
          VITE_AURORAVIEW_GALLERY_FRONTEND_OTLP_ENDPOINT: ${{ secrets.SENTRY_FRONTEND_OTLP_ENDPOINT }}
          VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_SAMPLE_RATE: ${{ vars.SENTRY_FRONTEND_SAMPLE_RATE || '1.0' }}
          VITE_AURORAVIEW_GALLERY_FRONTEND_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_FRONTEND_TRACES_SAMPLE_RATE || '0.2' }}
          # Rust/Packed Client Sentry configuration (injected from GitHub Secrets)
          AURORAVIEW_GALLERY_RUST_SENTRY_DSN: ${{ secrets.SENTRY_RUST_DSN }}
          AURORAVIEW_GALLERY_RUST_OTLP_ENDPOINT: ${{ secrets.SENTRY_RUST_OTLP_ENDPOINT }}
          AURORAVIEW_GALLERY_RUST_SERVICE_NAME: auroraview-gallery-packed-client
          AURORAVIEW_GALLERY_RUST_SENTRY_ENV: production
          AURORAVIEW_GALLERY_RUST_SENTRY_SAMPLE_RATE: ${{ vars.SENTRY_RUST_SAMPLE_RATE || '1.0' }}
          AURORAVIEW_GALLERY_RUST_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_RUST_TRACES_SAMPLE_RATE || '0.2' }}


      - name: Verify pack output
        shell: bash
        run: |
          echo "Pack output:"
          ls -la target/pack/
          # Verify executable exists
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            test -f "target/pack/auroraview-gallery.exe" || (echo "ERROR: Executable not found" && exit 1)
          else
            test -f "target/pack/auroraview-gallery" || (echo "ERROR: Executable not found" && exit 1)
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "target/pack/${{ matrix.artifact }}"
          Compress-Archive -Path $artifact -DestinationPath ${{ matrix.archive }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/pack
          tar -czvf ${{ github.workspace }}/${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gallery-${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  # E2E tests on Windows (representative platform)
  e2e-test:
    name: E2E Tests (Windows)
    runs-on: windows-latest
    needs: build
    # Only run on main branch or manual trigger
    if: (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6

      - name: Setup AuroraView Environment
        uses: ./.github/actions/setup-auroraview
        with:
          install-dependencies: 'false'
          cache-key-suffix: 'gallery-e2e-windows'

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: gallery-x86_64-pc-windows-msvc
          path: artifacts/

      - name: Extract artifact
        shell: pwsh
        run: |
          Expand-Archive -Path artifacts/auroraview-gallery-windows-x64.zip -DestinationPath gallery/pack-output -Force
          # Find the exe wherever it was extracted (handles both flat and nested zip layouts)
          $exe = Get-ChildItem -Path gallery/pack-output -Recurse -Filter 'auroraview-gallery.exe' | Select-Object -First 1
          if (-not $exe) {
            Write-Error "auroraview-gallery.exe not found in archive"
            exit 1
          }
          # Move to expected location if nested
          if ($exe.DirectoryName -ne (Resolve-Path gallery/pack-output).Path) {
            Move-Item $exe.FullName gallery/pack-output/auroraview-gallery.exe -Force
          }
          Write-Host "Gallery executable ready:"
          ls gallery/pack-output/auroraview-gallery.exe

      - name: Install Playwright
        run: vx just gallery-ci-playwright-install

      - name: Start Gallery with CDP
        shell: pwsh
        run: |
          Start-Process -FilePath "gallery\pack-output\auroraview-gallery.exe" -WorkingDirectory "gallery\pack-output"

      - name: Wait for CDP port
        shell: pwsh
        run: |
          $deadline = (Get-Date).AddSeconds(60)
          while ((Get-Date) -lt $deadline) {
            try {
              $r = Invoke-WebRequest -Uri 'http://127.0.0.1:9222/json/version' -TimeoutSec 2 -UseBasicParsing
              if ($r.StatusCode -eq 200) {
                Write-Host "CDP ready!"
                exit 0
              }
            } catch { }
            Start-Sleep -Milliseconds 1000
          }
          Write-Host "ERROR: CDP not ready after 60s"
          exit 1

      - name: Run CDP E2E tests
        run: vx uv run pytest tests/test_gallery_cdp.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: |
            gallery/test_screenshot.png
            test-screenshots/
          retention-days: 7
          if-no-files-found: ignore


      - name: Stop Gallery
        if: always()
        shell: pwsh
        run: |
          Get-Process -Name 'auroraview-gallery' -ErrorAction SilentlyContinue | Stop-Process -Force

  # Combine all artifacts into one
  # Uses if: always() to run even if some builds fail, ensuring partial releases
  combine-artifacts:
    name: Combine Gallery Artifacts
    runs-on: ubuntu-latest
    needs: build
    if: always() && !cancelled()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: gallery-*
          path: artifacts
          merge-multiple: true
        continue-on-error: true

      - name: List artifacts
        run: |
          echo "Available gallery artifacts:"
          if [ -d artifacts ]; then
            ls -la artifacts/ || echo "No artifacts found"
          else
            echo "artifacts directory does not exist"
          fi

      - name: Check if any artifacts exist
        id: check
        run: |
          if [ -d artifacts ] && [ "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "has_artifacts=true" >> $GITHUB_OUTPUT
            echo "Found gallery artifacts to upload"
          else
            echo "has_artifacts=false" >> $GITHUB_OUTPUT
            echo "No gallery artifacts found"
          fi

      - name: Upload combined artifact
        if: steps.check.outputs.has_artifacts == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: gallery-all-platforms
          path: artifacts/*
          if-no-files-found: warn
